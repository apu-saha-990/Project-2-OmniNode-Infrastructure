# =============================================================
# OmniNode — Bitcoin Core Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitcoin
  namespace: omninode
  labels:
    app: bitcoin
    component: blockchain-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bitcoin
  template:
    metadata:
      labels:
        app: bitcoin
        component: blockchain-node
    spec:
      containers:
        - name: bitcoin
          image: lncm/bitcoind:v25.0
          ports:
            - containerPort: 8332
              name: rpc
            - containerPort: 8333
              name: p2p
          envFrom:
            - configMapRef:
                name: omninode-config
            - secretRef:
                name: omninode-secrets
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
          volumeMounts:
            - name: bitcoin-data
              mountPath: /data/.bitcoin
          livenessProbe:
            exec:
              command:
                - bitcoin-cli
                - -rpcuser=$(BTC_RPC_USER)
                - -rpcpassword=$(BTC_RPC_PASS)
                - getblockchaininfo
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: bitcoin-data
          persistentVolumeClaim:
            claimName: bitcoin-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: bitcoin
  namespace: omninode
spec:
  selector:
    app: bitcoin
  ports:
    - name: rpc
      port: 8332
      targetPort: 8332
    - name: p2p
      port: 8333
      targetPort: 8333
