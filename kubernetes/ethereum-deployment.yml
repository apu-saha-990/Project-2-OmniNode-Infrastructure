# =============================================================
# OmniNode — Ethereum Geth Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ethereum
  namespace: omninode
  labels:
    app: ethereum
    component: blockchain-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ethereum
  template:
    metadata:
      labels:
        app: ethereum
        component: blockchain-node
    spec:
      containers:
        - name: ethereum
          image: ethereum/client-go:stable
          args:
            - --datadir=/data
            - --http
            - --http.addr=0.0.0.0
            - --http.port=8545
            - --http.api=eth,net,web3,txpool
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port=8546
            - --ws.api=eth,net,web3,txpool
            - --metrics
            - --metrics.addr=0.0.0.0
            - --metrics.port=6060
            - --sepolia
            - --syncmode=snap
            - --maxpeers=25
            - --authrpc.addr=0.0.0.0
            - --authrpc.port=8551
            - --authrpc.vhosts=*
            - --authrpc.jwtsecret=/data/geth/jwtsecret
          ports:
            - containerPort: 8545
              name: http-rpc
            - containerPort: 8546
              name: ws-rpc
            - containerPort: 30303
              name: p2p
            - containerPort: 6060
              name: metrics
          resources:
            limits:
              cpu: "4"
              memory: "8Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: ethereum-data
              mountPath: /data
      volumes:
        - name: ethereum-data
          persistentVolumeClaim:
            claimName: ethereum-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ethereum
  namespace: omninode
spec:
  selector:
    app: ethereum
  ports:
    - name: http-rpc
      port: 8545
      targetPort: 8545
    - name: ws-rpc
      port: 8546
      targetPort: 8546
    - name: p2p
      port: 30303
      targetPort: 30303
    - name: metrics
      port: 6060
      targetPort: 6060
