# =============================================================
# OmniNode — Lighthouse Beacon Client Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lighthouse
  namespace: omninode
  labels:
    app: lighthouse
    component: consensus-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lighthouse
  template:
    metadata:
      labels:
        app: lighthouse
        component: consensus-client
    spec:
      containers:
        - name: lighthouse
          image: sigp/lighthouse:latest
          args:
            - lighthouse
            - bn
            - --network=sepolia
            - --datadir=/data
            - --http
            - --http-address=0.0.0.0
            - --http-port=5052
            - --execution-endpoint=http://ethereum:8551
            - --execution-jwt=/data/jwtsecret
            - --checkpoint-sync-url=https://sepolia.beaconstate.info
          ports:
            - containerPort: 5052
              name: http
            - containerPort: 9000
              name: p2p-tcp
              protocol: TCP
            - containerPort: 9000
              name: p2p-udp
              protocol: UDP
          resources:
            limits:
              cpu: "2"
              memory: "4Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
          volumeMounts:
            - name: lighthouse-data
              mountPath: /data
      volumes:
        - name: lighthouse-data
          persistentVolumeClaim:
            claimName: lighthouse-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: lighthouse
  namespace: omninode
spec:
  selector:
    app: lighthouse
  ports:
    - name: http
      port: 5052
      targetPort: 5052
    - name: p2p
      port: 9000
      targetPort: 9000
