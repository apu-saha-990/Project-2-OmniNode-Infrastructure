# =============================================================
# Alertmanager Configuration — OmniNode
# =============================================================

global:
  resolve_timeout: 5m

# Routing tree
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'discord'

  routes:
    # Critical alerts — immediate
    - match:
        severity: critical
      receiver: 'discord'
      group_wait: 5s
      repeat_interval: 1h

    # Warning alerts — normal cadence
    - match:
        severity: warning
      receiver: 'discord'
      repeat_interval: 6h

# Receivers
receivers:
  - name: 'discord'
    webhook_configs:
      - url: '${DISCORD_WEBHOOK_URL}'
        send_resolved: true
        http_config:
          follow_redirects: true
        title: '{{ if eq .Status "firing" }}🔴 ALERT{{ else }}✅ RESOLVED{{ end }} — OmniNode'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          *Status:* {{ .Status }}
          {{ end }}

# Inhibition rules — suppress warning if critical already firing
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
